version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - redis

# Note: PostgreSQL is hosted on Neon (external) — no local DB container needed.
